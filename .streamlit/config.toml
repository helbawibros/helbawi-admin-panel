[theme]
# اللون الأساسي (للأزرار، التحديد، وأشرطة التحميل) - ذهبي حلباوي
primaryColor = "#D4AF37"

# لون الخلفية الأساسية للموقع - كحلي داكن/أسود ليلي
backgroundColor = "#0b0e14"

# لون الخلفية الثانوية (للقائمة الجانبية والمربعات) - كحلي أفتح شوي
secondaryBackgroundColor = "#161b26"

# لون النصوص الأساسية - أبيض ناصع لتسهيل القراءة
textColor = "#FFFFFF"

# نوع الخط المفضل للبرنامج
font = "sans serif"
